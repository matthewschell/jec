<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Reviews...</title>
    
    <meta http-equiv="refresh" content="1;url=https://search.google.com/local/writereview?placeid=ChIJJVFIJqJh1YkRXyQupctnOEc">

    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
            text-align: center;
        }
        .stars {
            color: #FFD700; /* Gold Color */
            font-size: 40px;
            letter-spacing: 5px;
            margin-bottom: 15px;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0056b3; 
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        p { color: #333; font-weight: bold; font-size: 24px; }
        .subtext { font-size: 16px; color: #666; font-weight: normal; margin-top: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div>
        <div class="stars">★★★★★</div>
        
        <div class="loader"></div>
        <p>We'd love to hear from you!</p>
        <p class="subtext">Taking you to Google Reviews...</p>
    </div>

    <script>
        
        setTimeout(function() {
            window.location.href = "https://search.google.com/local/writereview?placeid=ChIJJVFIJqJh1YkRXyQupctnOEc";
        }, 900);
    </script>

</body>
</html>
